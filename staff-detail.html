<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>S.P.T | Staff Detail</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="firebase-config.js"></script>
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #020617; color: #f1f5f9; margin: 0; }
        .glass-card { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .avatar-gold { background: rgba(234, 179, 8, 0.2); border: 1.5px solid rgba(234, 179, 8, 0.6); color: #fbbf24; }
        .avatar-normal { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); color: #94a3b8; }
        .timeline-line { position: absolute; left: 20px; top: 0; bottom: 0; width: 1px; background: rgba(255,255,255,0.03); }
        
        #summary-modal { 
            display: none; align-items: center; justify-content: center; position: fixed; inset: 0; z-index: 9999; 
            background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(10px); opacity: 0; transition: opacity 0.3s ease;
        }
        #summary-modal.open { display: flex; opacity: 1; }
        .modal-premium-glass {
            background: rgba(255, 255, 255, 0.01); backdrop-filter: blur(25px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 36px;
            box-shadow: 0 30px 60px -15px rgba(0, 0, 0, 0.7); transform: scale(0.9); transition: transform 0.3s ease;
        }
        #summary-modal.open .modal-premium-glass { transform: scale(1); }
    </style>
</head>
<body class="pb-10">

    <div id="summary-modal" onclick="closeModal()">
        <div class="modal-premium-glass w-[90%] max-w-sm p-9 border border-white/10" onclick="event.stopPropagation()">
            <div class="flex justify-between items-center mb-10 pb-4 border-b border-white/5">
                <h3 class="text-2xl font-black uppercase tracking-tighter text-white">Summary</h3>
                <button onclick="closeModal()" class="w-9 h-9 glass-card rounded-xl flex items-center justify-center border-white/10 active:scale-90 transition-all text-slate-400">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2.5" d="M6 18L18 6M6 6l12 12"/></svg>
                </button>
            </div>
            <div id="summary-list" class="space-y-6"></div>
            <div class="mt-12 pt-6 border-t border-white/5 text-center">
                <p class="text-[10px] font-black text-slate-600 uppercase tracking-widest">SPT INTER SERVICE © 2026</p>
            </div>
        </div>
    </div>

    <nav class="sticky top-0 z-50 px-6 py-5 bg-[#020617]/90 backdrop-blur-xl border-b border-white/5 flex justify-between items-center">
        <button onclick="window.location.href='staff.html'" class="w-12 h-12 glass-card flex items-center justify-center border-white/10 rounded-xl active:scale-90 transition-all shadow-lg shadow-black/20 text-white">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="3" d="M15 19l-7-7 7-7"/></svg>
        </button>
        <button onclick="openModal()" class="w-12 h-12 glass-card flex flex-col items-center justify-center gap-1.5 border-white/10 rounded-xl active:scale-90 transition-all shadow-lg shadow-black/20">
            <div class="w-6 h-1 bg-white rounded-full shadow-[0_0_8px_#fff]"></div>
            <div class="w-6 h-1 bg-white rounded-full shadow-[0_0_8px_#fff]"></div>
            <div class="w-4 h-1 bg-white rounded-full self-start ml-3 shadow-[0_0_8px_#fff]"></div>
        </button>
    </nav>

    <main class="p-6 max-w-lg mx-auto">
        <div class="flex items-center gap-7 mb-12 px-2">
            <div id="det-avatar" class="w-20 h-20 rounded-[2rem] flex items-center justify-center text-3xl font-black shadow-2xl">?</div>
            <div>
                <h2 id="det-name" class="text-3xl font-black uppercase tracking-tighter leading-none mb-2.5 text-white">---</h2>
                <p id="det-id" class="text-slate-500 font-bold text-[11px] uppercase tracking-[0.25em]">ID-0000</p>
            </div>
        </div>

        <div id="det-stats" class="space-y-5 mb-14"></div>

        <div class="relative">
            <p class="text-[10px] font-black text-slate-600 uppercase tracking-[0.4em] mb-9 ml-2">History</p>
            <div class="timeline-line"></div>
            <div id="det-logs" class="space-y-8 relative"></div>
        </div>
    </main>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const id = urlParams.get('id');
        const name = decodeURIComponent(urlParams.get('name') || 'Staff');
        const isMe = urlParams.get('isMe') === 'true';

        function openModal() { document.getElementById('summary-modal').classList.add('open'); }
        function closeModal() { document.getElementById('summary-modal').classList.remove('open'); }

        function initDetail() {
            if(!id) { window.location.href = 'staff.html'; return; }
            const avatar = document.getElementById('det-avatar');
            avatar.className = `w-20 h-20 rounded-[2rem] flex items-center justify-center text-3xl font-black shadow-2xl ${isMe ? 'avatar-gold' : 'avatar-normal'}`;
            avatar.innerText = name[0];
            document.getElementById('det-name').innerText = name;
            document.getElementById('det-id').innerText = "ID-" + id;
            loadData();
        }

        function loadData() {
            db.collection("shifts").where("workerId", "==", Number(id)).onSnapshot(snap => {
                let w1FT=0, w1PT=0, w1T=0, w2FT=0, w2PT=0, w2T=0;
                let grouped = {};
                let shiftSummaryCounts = {};

                snap.forEach(doc => {
                    const s = doc.data();
                    const [st, en] = s.time.split('-');
                    let h = (parseInt(en.split(':')[0]) - parseInt(st.split(':')[0]));
                    let dur = h < 0 ? h + 24 : h;
                    const isFT = dur >= 8;
                    const day = parseInt(s.date.split('-')[2]);

                    if(day <= 15) { 
                        if(isFT){ w1FT++; w1T+=380; } else { w1PT+=dur; w1T+=(dur*60); } 
                    } else { 
                        if(isFT){ w2FT++; w2T+=380; } else { w2PT+=dur; w2T+=(dur*60); } 
                    }

                    if(!shiftSummaryCounts[s.time]) shiftSummaryCounts[s.time] = { ft: 0, pt: 0, total: 0 };
                    if(isFT) shiftSummaryCounts[s.time].ft++; else shiftSummaryCounts[s.time].pt++;
                    shiftSummaryCounts[s.time].total++;

                    if(!grouped[s.date]) grouped[s.date] = [];
                    grouped[s.date].push({...s, dur, st});
                });

                document.getElementById('summary-list').innerHTML = Object.entries(shiftSummaryCounts).map(([time, counts]) => {
                    const stTime = time.split('-')[0];
                    const isGroupFT = counts.ft > counts.pt;
                    let textColor = isGroupFT ? "text-rose-400" : (stTime === "17:00" ? "text-teal-400" : "text-amber-400");
                    let badgeColor = isGroupFT ? "border-rose-500/20 bg-rose-500/5" : (stTime === "17:00" ? "border-teal-500/20 bg-teal-500/5" : "border-amber-500/20 bg-amber-500/5");

                    return `<div class="flex justify-between items-center py-4 border-b border-white/5">
                        <div><span class="text-[12px] font-black uppercase tracking-[0.15em] ${textColor}">${time}</span>
                        <p class="text-[9px] font-bold text-slate-500 uppercase tracking-widest mt-0.5">FT: ${counts.ft}, PT: ${counts.pt}</p></div>
                        <span class="text-sm font-black text-white px-3 py-1 rounded-lg border border-white/5 ${badgeColor}">${counts.total} DAYS</span>
                    </div>`;
                }).join('');

                const isW1 = (new Date()).getDate() <= 15;
                const statsHtml = (ft, pt, tot, title, active) => `
                    <div class="glass-card p-7 rounded-[30px] border-l-[6px] shadow-xl ${active ? 'border-green-500 bg-green-950/5' : 'border-rose-600 bg-rose-950/5'}">
                        <div class="flex justify-between items-center mb-7">
                            <p class="text-[11px] font-black uppercase tracking-[0.2em] ${active ? 'text-green-500' : 'text-rose-500'}">${title}</p>
                            <span class="text-[9px] font-black px-3 py-1 rounded-full uppercase tracking-wider ${active ? 'bg-green-500 text-[#020617]' : 'bg-rose-500 text-white'}">${active ? 'Active' : 'Expired'}</span>
                        </div>
                        <div class="space-y-4 mb-7">
                            <div class="flex justify-between text-[11px] font-black text-slate-400 uppercase"><span>FT (${ft}) × 380</span><span class="text-white">${ft*380}</span></div>
                            <div class="flex justify-between text-[11px] font-black text-slate-400 uppercase"><span>PT (${pt}) × 60</span><span class="text-white">${pt*60}</span></div>
                        </div>
                        <div class="pt-6 border-t border-white/10 flex justify-between items-end">
                            <span class="text-[10px] font-black text-slate-500 uppercase tracking-[0.25em]">Net Earnings</span>
                            <span class="text-4xl font-black text-white tracking-tighter">${tot}</span>
                        </div>
                    </div>`;

                document.getElementById('det-stats').innerHTML = statsHtml(w1FT, w1PT, w1T, "Week 1 (01-15)", isW1) + statsHtml(w2FT, w2PT, w2T, "Week 2 (16-End)", !isW1);

                const container = document.getElementById('det-logs');
                container.innerHTML = "";
                Object.keys(grouped).sort((a,b) => new Date(b) - new Date(a)).forEach(date => {
                    let shiftsHtml = "";
                    grouped[date].forEach(s => {
                        const isFT = s.dur >= 8;
                        let colorClass = isFT ? "text-rose-400 border-rose-500/20 bg-rose-500/5" : (s.st === "17:00" ? "text-teal-400 border-teal-500/20 bg-teal-500/5" : "text-amber-400 border-amber-500/20 bg-amber-500/5");
                        shiftsHtml += `<div class="glass-card px-4 py-3 rounded-xl border flex justify-between items-center ${colorClass}">
                            <span class="text-[12px] font-black tracking-widest uppercase text-white">${s.time}</span>
                            <span class="text-[9px] font-black px-2.5 py-1 rounded-lg bg-black/30 border border-white/5 uppercase tracking-[0.15em] text-inherit">${isFT ? 'Full Time' : 'Part Time'}</span>
                        </div>`;
                    });

                    const firstS = grouped[date][0];
                    let dotColor = firstS.dur >= 8 ? "bg-rose-500 shadow-[0_0_12px_#f43f5e]" : (firstS.st === "17:00" ? "bg-teal-500 shadow-[0_0_12px_#14b8a6]" : "bg-amber-500 shadow-[0_0_12px_#f59e0b]");

                    container.innerHTML += `<div class="relative pl-12 group">
                        <div class="absolute left-[16px] top-1.5 w-3.5 h-3.5 rounded-full border-2 border-[#020617] z-10 ${dotColor}"></div>
                        <h4 class="text-[11px] font-black text-slate-300 uppercase tracking-tighter mb-4 ml-1">${date}</h4>
                        <div class="space-y-3">${shiftsHtml}</div>
                    </div>`;
                });
            });
        }
        window.onload = initDetail;
    </script>
</body>
</html>

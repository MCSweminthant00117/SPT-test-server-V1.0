<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SPT MASTER</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="firebase-config.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { font-style: normal !important; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: #020617; color: white; padding-bottom: 120px; }
        
        /* RESTORED: Premium Glass Card & Selects */
        .glass-card { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .modern-select { background: #0f172a; border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 12px; color: white; outline: none; appearance: none; }
        
        .q-btn { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.08); color: #94a3b8; transition: 0.2s; }
        .q-btn.active { background: #db2777; border-color: #db2777; color: #fff; font-weight: 900; }

        /* POST BUTTON: Glass Style */
        .post-glass-btn { 
            background: rgba(219, 39, 119, 0.05); 
            backdrop-filter: blur(10px); 
            border: 1px solid rgba(219, 39, 119, 0.3); 
            border-radius: 2rem; 
            box-shadow: 0 8px 32px rgba(219, 39, 119, 0.1);
        }

        /* PERSONNEL LIST: No Scroll */
        .staff-list-item { border-bottom: 1px solid rgba(255, 255, 255, 0.05); }
        input[type="checkbox"] { width: 18px; height: 18px; accent-color: #db2777; }

        /* RECAP UI: Screenshot Match */
        .recap-bar { background: rgba(139, 92, 246, 0.1); border-radius: 1rem; }
        .recap-card-new { background: rgba(255, 255, 255, 0.03); border-radius: 12px; border: 1px solid rgba(255, 255, 255, 0.05); }

        /* DIALOG */
        .glass-overlay { position: fixed; inset: 0; background: rgba(2, 6, 23, 0.98); backdrop-filter: blur(20px); display: none; z-index: 9999; align-items: center; justify-content: center; }
        .dialog-box { background: #0a0f1e; border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 2.5rem; width: 92%; max-width: 400px; }
        
        /* FAB */
        .fab-premium { background: rgba(139, 92, 246, 0.1); backdrop-filter: blur(15px); border: 1px solid rgba(139, 92, 246, 0.3); border-radius: 1.5rem; }
    </style>
</head>
<body class="p-6 max-w-lg mx-auto">

    <div id="custom-dialog" class="glass-overlay">
        <div class="dialog-box p-8">
            <h3 id="dialog-title" class="text-lg font-black uppercase text-pink-500 text-center mb-6"></h3>
            <div id="dialog-body" class="max-h-[380px] overflow-y-auto text-[11px] font-bold text-slate-400 space-y-2 mb-8 pr-2"></div>
            <div id="dialog-footer" class="flex gap-4"></div>
        </div>
    </div>

    <header class="mb-10 flex justify-between items-end">
        <div>
            <h2 class="text-2xl font-black uppercase tracking-tighter text-pink-600">Assign Shifts</h2>
            <p class="text-[9px] font-bold text-slate-500 uppercase tracking-widest mt-1">S.P.T MASTER</p>
        </div>
        <div class="text-right pb-1">
            <p id="header-day" class="text-[10px] font-black text-slate-400 uppercase"></p>
            <p id="header-date" class="text-[12px] font-bold text-pink-500/80"></p>
        </div>
    </header>

    <div class="space-y-8">
        <section>
            <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest ml-1 mb-3 block">1. Target Date</label>
            <input type="date" id="as-date" class="w-full p-4 glass-card rounded-2xl font-bold text-sm outline-none border-white/5">
        </section>

        <section>
            <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest ml-1 mb-3 block">2. Shift Time Selection</label>
            <div class="grid grid-cols-3 gap-2 mb-4">
                <button onclick="setQuickTime('17:00','22:00', this)" class="q-btn py-3 rounded-xl text-[9px] font-black uppercase">17:00-22:00</button>
                <button onclick="setQuickTime('22:00','02:00', this)" class="q-btn py-3 rounded-xl text-[9px] font-black uppercase">22:00-02:00</button>
                <button onclick="setQuickTime('22:00','07:00', this)" class="q-btn py-3 rounded-xl text-[9px] font-black uppercase">22:00-07:00</button>
            </div>
            <div class="grid grid-cols-2 gap-3">
                <select id="start-t" onchange="clearQuick()" class="p-4 modern-select font-bold text-xs"></select>
                <select id="end-t" onchange="clearQuick()" class="p-4 modern-select font-bold text-xs"></select>
            </div>
        </section>

        <section>
            <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest ml-1 mb-3 block">3. Personnel List</label>
            <div id="staff-list"></div>
        </section>

        <button onclick="preConfirmPost()" class="post-glass-btn w-full py-6 text-white font-black text-[11px] uppercase tracking-widest mt-4">
            Confirm Assignment
        </button>
    </div>

    <div id="recap-modal" class="fixed inset-0 z-[5000] hidden bg-[#020617] overflow-y-auto">
        <div class="p-6 max-w-lg mx-auto">
            <div class="flex justify-between items-center mb-8 mt-4">
                <h2 class="text-2xl font-black text-blue-400 uppercase tracking-tight">Daily Recap</h2>
                <div id="recap-del-container" class="hidden">
                    <button onclick="askMultiDelete()" id="multi-del-btn" class="px-5 py-2.5 bg-red-600 text-white rounded-xl font-black text-[10px] uppercase">Delete (0)</button>
                </div>
                <button onclick="toggleRecap(false)" class="p-2 text-slate-500"><svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="3" d="M6 18L18 6M6 6l12 12"/></svg></button>
            </div>

            <input type="date" id="summary-date" onchange="loadDailySummary()" class="w-full p-4 glass-card rounded-2xl font-bold text-xs mb-8 outline-none border-white/5">
            
            <div id="summary-header-bar" class="recap-bar p-5 flex justify-between items-center mb-8 hidden">
                <span id="res-date" class="text-[11px] font-bold text-slate-300"></span>
                <span id="res-total" class="text-[11px] font-bold text-slate-300 uppercase"></span>
            </div>
            <div id="summary-content" class="space-y-10 pb-32"></div>
        </div>
    </div>

    <button onclick="toggleRecap(true)" class="fixed bottom-10 right-8 w-16 h-16 fab-premium flex items-center justify-center z-[4000] active:scale-90 transition-transform">
        <svg class="w-7 h-7 text-violet-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2.5" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
    </button>

    <script>
        let workersData = {};
        let selectedForDelete = [];

        // Time Setup
        const hours = ["01:00","02:00","03:00","04:00","05:00","06:00","07:00","08:00","09:00","10:00","11:00","12:00","13:00","14:00","15:00","16:00","17:00","18:00","19:00","20:00","21:00","22:00","23:00","00:00"];
        ['start-t', 'end-t'].forEach(id => {
            const el = document.getElementById(id);
            el.innerHTML = `<option value="">${id.includes('start') ? 'START' : 'END'}</option>`;
            hours.forEach(t => el.innerHTML += `<option value="${t}">${t}</option>`);
        });

        function setQuickTime(st, en, btn) {
            document.querySelectorAll('.q-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById('start-t').value = st;
            document.getElementById('end-t').value = en;
        }
        function clearQuick() { document.querySelectorAll('.q-btn').forEach(b => b.classList.remove('active')); }

        // Personnel List
        db.collection("workers").orderBy("workerCode", "asc").onSnapshot(snap => {
            const list = document.getElementById('staff-list');
            list.innerHTML = "";
            snap.forEach(doc => {
                const w = doc.data();
                workersData[w.workerCode] = w.name;
                list.innerHTML += `
                <label class="staff-list-item flex items-center gap-5 p-5 cursor-pointer active:bg-white/5">
                    <input type="checkbox" name="worker" value="${w.workerCode}">
                    <span class="text-[12px] font-bold tracking-wider text-slate-200 uppercase">${w.workerCode} — ${w.name}</span>
                </label>`;
            });
        });

        // Dialog & Confirm
        function preConfirmPost() {
            const date = document.getElementById('as-date').value;
            const st = document.getElementById('start-t').value;
            const en = document.getElementById('end-t').value;
            const selected = Array.from(document.querySelectorAll('input[name="worker"]:checked')).map(el => Number(el.value));
            if(!date || !st || !en || selected.length === 0) return showGlassDialog("Attention", "Please complete all fields.", "alert");

            let detailHtml = `<div class='bg-pink-600/10 p-5 rounded-2xl mb-6 border border-pink-600/20'>
                <p class='text-[10px] text-pink-500 font-black mb-1 uppercase tracking-widest'>Shift Info</p>
                <p class='text-sm font-black'>${date} [${st} - ${en}]</p>
            </div><div class='space-y-1'>`;
            selected.forEach(id => detailHtml += `<div class='p-3 bg-white/5 rounded-xl flex justify-between items-center'><span class='text-slate-300'>${workersData[id]}</span><span class='text-[9px] text-slate-600 font-black'>ID: ${id}</span></div>`);
            detailHtml += `</div>`;

            showGlassDialog("Confirm Post", detailHtml, "confirm", async () => {
                closeDialog();
                const batch = db.batch();
                selected.forEach(id => batch.set(db.collection("shifts").doc(), { date, time: `${st}-${en}`, workerId: id }));
                await batch.commit();
                document.querySelectorAll('input[name="worker"]').forEach(cb => cb.checked = false);
                showGlassDialog("Success", "Shifts dispatched successfully.", "alert");
            });
        }

        // Recap Logic
        function toggleRecap(show) {
            document.getElementById('recap-modal').style.display = show ? 'block' : 'none';
            if(show) {
                document.getElementById('summary-date').value = document.getElementById('as-date').value || new Date().toISOString().split('T')[0];
                loadDailySummary();
            }
        }

        async function loadDailySummary() {
            const date = document.getElementById('summary-date').value;
            const content = document.getElementById('summary-content');
            const headerBar = document.getElementById('summary-header-bar');
            const snap = await db.collection("shifts").where("date", "==", date).get();
            if(snap.empty) { content.innerHTML = "<p class='text-center py-20 text-slate-800 text-[10px] font-black uppercase'>No Records</p>"; headerBar.classList.add('hidden'); return; }
            
            headerBar.classList.remove('hidden');
            document.getElementById('res-date').innerText = date;
            document.getElementById('res-total').innerText = `Total: ${snap.size}`;

            let grouped = {};
            snap.forEach(doc => {
                const s = doc.data();
                if(!grouped[s.time]) grouped[s.time] = [];
                grouped[s.time].push({id: doc.id, ...s});
            });

            content.innerHTML = "";
            selectedForDelete = []; updateDelBtn();
            Object.keys(grouped).sort().forEach(time => {
                let cards = `<h4 class="text-[11px] font-bold mb-5 tracking-widest text-slate-100 uppercase">${time} (${grouped[time].length})</h4>`;
                grouped[time].forEach(p => {
                    cards += `<label class="recap-card-new p-5 mb-4 flex items-center gap-5 cursor-pointer active:bg-white/5"><input type="checkbox" onchange="toggleSelectDel('${p.id}', this)" class="w-4 h-4 accent-pink-500"><span class="text-[12px] font-bold uppercase text-slate-200">${p.workerId} - ${workersData[p.workerId]}</span></label>`;
                });
                content.innerHTML += `<div>${cards}</div>`;
            });
        }

        function toggleSelectDel(id, el) {
            if(el.checked) selectedForDelete.push(id);
            else selectedForDelete = selectedForDelete.filter(x => x !== id);
            updateDelBtn();
        }
        function updateDelBtn() {
            const container = document.getElementById('recap-del-container');
            const btn = document.getElementById('multi-del-btn');
            btn.innerText = `Delete (${selectedForDelete.length})`;
            container.classList.toggle('hidden', selectedForDelete.length === 0);
        }
        async function askMultiDelete() {
            showGlassDialog("Delete Logs", `Remove ${selectedForDelete.length} records?`, "confirm", async () => {
                const batch = db.batch();
                selectedForDelete.forEach(id => batch.delete(db.collection("shifts").doc(id)));
                await batch.commit(); closeDialog(); loadDailySummary();
            });
        }

        function showGlassDialog(title, body, type, callback) {
            const d = document.getElementById('custom-dialog');
            document.getElementById('dialog-title').innerText = title;
            document.getElementById('dialog-body').innerHTML = body;
            const footer = document.getElementById('dialog-footer');
            footer.innerHTML = type === "confirm" ? `<button onclick="closeDialog()" class="flex-1 py-4 text-[10px] font-bold text-slate-500 uppercase">Cancel</button><button id="dia-ok" class="flex-1 py-4 bg-pink-700 text-white rounded-xl text-[10px] font-bold uppercase">Confirm</button>` : `<button onclick="closeDialog()" class="w-full py-4 bg-pink-700 text-white rounded-xl text-[10px] font-bold uppercase">OK</button>`;
            if(type === "confirm") document.getElementById('dia-ok').onclick = callback;
            d.style.display = 'flex';
        }
        function closeDialog() { document.getElementById('custom-dialog').style.display = 'none'; }

        window.onload = () => { 
            const now = new Date();
            document.getElementById('as-date').value = now.toISOString().split('T')[0];
            document.getElementById('header-day').innerText = now.toLocaleDateString('en-GB', {weekday: 'long'});
            document.getElementById('header-date').innerText = now.toLocaleDateString('en-GB', {day:'numeric', month:'short', year:'numeric'});
        };
    </script>
</body>
</html>

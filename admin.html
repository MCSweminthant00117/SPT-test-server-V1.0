<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S.P.T Premium Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="firebase-config.js"></script>
    <style>
        * { font-style: normal !important; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #0f172a; color: #f1f5f9; overflow-x: hidden; }
        .premium-card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 24px; }
        .modern-input { background: rgba(15, 23, 42, 0.6); border: 1px solid rgba(255, 255, 255, 0.1); color: white; transition: all 0.3s; }
        .btn-premium { background: linear-gradient(135deg, #be185d, #831843); transition: all 0.4s; box-shadow: 0 4px 15px rgba(190, 24, 93, 0.3); }
        .page-view { transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1); position: absolute; width: 100%; left: 0; }
        .hidden-left { opacity: 0; transform: translateX(-50px); pointer-events: none; }
        .hidden-right { opacity: 0; transform: translateX(50px); pointer-events: none; }
        .active-view { opacity: 1; transform: translateX(0); pointer-events: auto; position: relative; }
        #detail-view { position: fixed; right: 0; top: 0; height: 100%; width: 100%; max-width: 450px; background: rgba(15, 23, 42, 0.98); backdrop-filter: blur(25px); z-index: 100; transform: translateX(100%); transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); border-left: 1px solid rgba(255,255,255,0.1); }
        #detail-view.open { transform: translateX(0); }
        .week-active { background: rgba(34, 197, 94, 0.12) !important; border: 1px solid rgba(34, 197, 94, 0.3) !important; }
        .week-past { background: rgba(239, 68, 68, 0.08) !important; border: 1px solid rgba(239, 68, 68, 0.2) !important; }
        .glass-back { background: rgba(255, 255, 255, 0.05) !important; backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1) !important; }
    </style>
</head>
<body class="min-h-screen pb-10">

    <div id="custom-delete-modal" class="fixed inset-0 z-[110] hidden items-center justify-center p-6">
        <div class="absolute inset-0 bg-slate-950/60 backdrop-blur-md"></div>
        <div class="relative bg-white/5 backdrop-blur-2xl border border-white/10 p-10 rounded-[2.5rem] w-full max-w-sm text-center shadow-2xl">
            <div class="w-20 h-20 bg-red-500/10 text-red-500 rounded-3xl flex items-center justify-center mx-auto mb-6 border border-red-500/20 shadow-inner">
                <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
            </div>
            <h3 class="text-2xl font-black text-white uppercase tracking-tighter mb-2 text-white">Confirm Delete?</h3>
            <p class="text-slate-400 text-[11px] leading-relaxed mb-10 px-4 uppercase font-bold tracking-wider">All records will be removed permanently.</p>
            <div class="flex flex-col gap-3">
                <button onclick="executeDelete()" class="w-full py-5 bg-red-600 hover:bg-red-700 text-white rounded-2xl font-black text-xs uppercase tracking-widest transition-all active:scale-95 shadow-lg shadow-red-600/30">Confirm Delete</button>
                <button onclick="closeDeleteModal()" class="w-full py-5 bg-white/5 hover:bg-white/10 text-slate-300 rounded-2xl font-black text-xs uppercase tracking-widest transition-all">Cancel</button>
            </div>
        </div>
    </div>

    <nav class="sticky top-0 z-50 px-6 py-4 bg-[#0f172a]/80 backdrop-blur-lg border-b border-white/5 flex justify-between items-center">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-pink-700 rounded-xl flex items-center justify-center font-black shadow-lg text-white">S</div>
            <span class="font-extrabold tracking-tighter text-xl uppercase text-white">SPT MASTER</span>
        </div>
        <button onclick="logout()" class="px-5 py-2 rounded-full border border-white/10 text-[10px] font-black uppercase text-white tracking-widest">Sign Out</button>
    </nav>

    <main class="max-w-4xl mx-auto p-6 relative overflow-hidden">
        <div id="view-directory" class="page-view active-view space-y-6 text-white">
            <header class="flex justify-between items-center bg-white/5 p-4 rounded-[2rem] border border-white/5">
                <div class="flex flex-col ml-2">
                    <h1 class="text-lg font-black uppercase tracking-tight">Personnel</h1>
                    <p id="stat-workers-text" class="text-[9px] text-slate-500 font-bold uppercase tracking-widest">0 Registered</p>
                </div>
                <button onclick="switchView('management')" class="btn-premium px-5 py-3 rounded-2xl font-black text-[10px] uppercase text-white">Manage</button>
            </header>
            <div id="admin-list" class="grid grid-cols-1 md:grid-cols-2 gap-3 text-white"></div>
        </div>

        <div id="view-management" class="page-view hidden-right space-y-8">
            <header class="flex items-center gap-4 text-white">
                <button onclick="switchView('directory')" class="w-10 h-10 rounded-xl glass-back flex items-center justify-center transition hover:bg-white/10">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="3" d="M15 19l-7-7 7-7"/></svg>
                </button>
                <h1 class="text-xl font-extrabold text-pink-500 uppercase">Control Panel</h1>
            </header>
            <div class="premium-card p-6 flex flex-col md:flex-row items-center justify-between gap-6 border-l-4 border-pink-600 text-white">
                <div><h2 class="text-lg font-black uppercase">Personnel Intake</h2><p class="text-slate-400 text-xs">Register new staff members.</p></div>
                <button onclick="toggleM(true)" class="btn-premium px-8 py-3 rounded-2xl font-black text-xs uppercase text-white">+ New Staff</button>
            </div>

            <section class="premium-card p-8 mt-6 text-white">
                <h2 class="font-bold uppercase mb-6 flex items-center gap-2"><span class="w-2 h-5 bg-pink-600 rounded-full"></span>Shift Assignment</h2>
                <div class="grid md:grid-cols-2 gap-8">
                    <div class="space-y-6">
                        <div><label class="text-[9px] font-black text-slate-500 uppercase ml-1">Service Date</label><input type="date" id="as-date" class="w-full mt-1 p-4 modern-input rounded-2xl font-bold text-sm"></div>
                        <div class="flex flex-col gap-2">
                             <button onclick="st('17:00-22:00', this)" class="t-btn p-4 rounded-2xl border border-white/5 bg-white/5 text-xs font-bold text-slate-400 text-left">17:00 - 22:00 (PT)</button>
                             <button onclick="st('22:00-02:00', this)" class="t-btn p-4 rounded-2xl border border-white/5 bg-white/5 text-xs font-bold text-slate-400 text-left">22:00 - 02:00 (PT)</button>
                             <button onclick="st('22:00-07:00', this)" class="t-btn p-4 rounded-2xl border border-white/5 bg-white/5 text-xs font-bold text-slate-400 text-left">22:00 - 07:00 (FT)</button>
                        </div>
                        <div class="grid grid-cols-2 gap-2 mt-2">
                            <select id="start-hour" onchange="clearQuick()" class="modern-input p-4 rounded-2xl font-bold text-xs"><option value="">Start</option></select>
                            <select id="end-hour" onchange="clearQuick()" class="modern-input p-4 rounded-2xl font-bold text-xs"><option value="">End</option></select>
                        </div>
                    </div>
                    <div class="flex flex-col">
                        <label class="text-[9px] font-black text-slate-500 uppercase mb-2 ml-1">Select Personnel</label>
                        <div id="check-list" class="flex-1 divide-y divide-white/5 modern-input rounded-2xl overflow-hidden text-white"></div>
                        <button onclick="saveShifts()" class="btn-premium w-full mt-4 py-4 rounded-2xl font-black text-xs uppercase text-white">Post Assignment</button>
                    </div>
                </div>
            </section>
        </div>
    </main>

    <div id="detail-view">
        <div class="p-8 h-full flex flex-col">
            <div class="flex justify-between items-center mb-6">
                <button onclick="toggleD(false)" class="w-10 h-10 rounded-xl glass-back flex items-center justify-center text-white">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="3" d="M15 19l-7-7 7-7"/></svg>
                </button>
                <button onclick="openDeleteModal()" class="text-red-500 text-[10px] font-black uppercase border border-red-500/20 px-3 py-1 rounded-lg">Delete Profile</button>
            </div>
            <div class="mb-8 text-white">
                <h2 id="det-name" class="text-3xl font-black uppercase tracking-tighter leading-none mb-1">...</h2>
                <p id="det-id-label" class="text-[10px] text-pink-500 font-bold uppercase">ID-0000</p>
            </div>
            <div id="det-stats" class="space-y-4 mb-8 text-white"></div>
            <div class="flex-1 overflow-y-auto pr-2 text-white" id="det-logs"></div>
        </div>
    </div>

    <div id="m-add" class="fixed inset-0 z-[100] hidden items-center justify-center p-6 bg-black/80 backdrop-blur-md">
        <div class="w-full max-w-sm premium-card p-10 text-white shadow-2xl">
            <h2 class="text-2xl font-black mb-1 uppercase tracking-tight">Register</h2>
            <input type="text" id="nw-name" placeholder="Name" class="w-full modern-input p-4 rounded-2xl mb-4 font-bold">
            <input type="number" id="nw-id" placeholder="7-Digit ID" class="w-full modern-input p-4 rounded-2xl mb-8 font-bold">
            <button onclick="addW()" class="btn-premium w-full py-4 rounded-2xl font-black text-xs uppercase">Save</button>
            <button onclick="toggleM(false)" class="w-full mt-4 text-[10px] text-slate-500 uppercase font-black text-center">Cancel</button>
        </div>
    </div>

    <script>
        const u = JSON.parse(localStorage.getItem("spt_user"));
        if(!u || u.role !== 'admin') window.location.href = "index.html";
        let selectedQuickTime = "";
        let currentWorkerId = null;

        function switchView(v) {
            const dir = document.getElementById('view-directory'), mgmt = document.getElementById('view-management');
            if(v === 'management') { dir.classList.add('hidden-left'); dir.classList.remove('active-view'); mgmt.classList.remove('hidden-right'); mgmt.classList.add('active-view'); }
            else { mgmt.classList.add('hidden-right'); mgmt.classList.remove('active-view'); dir.classList.remove('hidden-left'); dir.classList.add('active-view'); }
        }

        function st(t, b) { 
            selectedQuickTime = t; 
            document.querySelectorAll('.t-btn').forEach(x => x.classList.remove('border-pink-600','bg-pink-600/10','text-white')); 
            b.classList.add('border-pink-600','bg-pink-600/10','text-white'); 
        }
        function clearQuick() { selectedQuickTime = ""; document.querySelectorAll('.t-btn').forEach(x => x.classList.remove('border-pink-600','bg-pink-600/10','text-white')); }
        function toggleM(s) { document.getElementById('m-add').style.display = s ? 'flex' : 'none'; }
        function toggleD(s) { document.getElementById('detail-view').classList.toggle('open', s); }

        function openDeleteModal() { document.getElementById('custom-delete-modal').style.display = 'flex'; }
        function closeDeleteModal() { document.getElementById('custom-delete-modal').style.display = 'none'; }

        async function executeDelete() {
            const batch = db.batch();
            const wSnap = await db.collection("workers").where("workerCode", "==", currentWorkerId).get();
            wSnap.forEach(d => batch.delete(d.ref));
            const sSnap = await db.collection("shifts").where("workerId", "==", currentWorkerId).get();
            sSnap.forEach(d => batch.delete(d.ref));
            await batch.commit();
            closeDeleteModal(); toggleD(false); alert("Deleted Successfully.");
        }

        function populateHours() {
            const s = document.getElementById('start-hour'), e = document.getElementById('end-hour');
            for(let i=0; i<24; i++) {
                const h = i.toString().padStart(2, '0') + ":00";
                s.innerHTML += `<option value="${h}">${h}</option>`;
                e.innerHTML += `<option value="${h}">${h}</option>`;
            }
        }

        function init() {
            populateHours();
            // ✅ ၁။ ID အလိုက် စီရန် orderBy ထည့်သွင်းထားသည်
            db.collection("workers").orderBy("workerCode", "asc").onSnapshot(snap => {
                const list = document.getElementById('admin-list'), cl = document.getElementById('check-list');
                list.innerHTML = ""; cl.innerHTML = "";
                snap.forEach(doc => {
                    const w = doc.data();
                    list.innerHTML += `<div onclick="showD(${w.workerCode},'${w.name}')" class="premium-card p-4 flex items-center justify-between hover:bg-white/5 cursor-pointer">
                        <div class="flex items-center gap-3 text-white">
                            <div class="w-10 h-10 bg-pink-900 rounded-xl flex items-center justify-center font-black text-sm uppercase">${w.name[0]}</div>
                            <div><p class="text-sm font-bold uppercase">${w.name}</p><p class="text-[9px] text-slate-500 font-bold">${w.workerCode}</p></div>
                        </div><div class="text-slate-700">→</div></div>`;

                    // ✅ ၂။ Scroll box မဟုတ်ဘဲ ရှင်းရှင်းလင်းလင်း မြင်ရအောင် list ပုံစံထုတ်ထားသည်
                    cl.innerHTML += `<label class="flex items-center gap-3 p-4 hover:bg-white/5 cursor-pointer text-white transition-all">
                        <input type="checkbox" class="scb w-5 h-5 accent-pink-600 rounded-lg" value="${w.workerCode}" data-name="${w.name}">
                        <div class="font-bold text-xs uppercase tracking-wide">${w.workerCode} — ${w.name}</div></label>`;
                });
                document.getElementById('stat-workers-text').innerText = snap.size + " REGISTERED";
            });
        }

        async function saveShifts() {
            const d = document.getElementById('as-date').value;
            const customSt = document.getElementById('start-hour').value;
            const customEn = document.getElementById('end-hour').value;
            let finalTime = selectedQuickTime || (customSt && customEn ? customSt + "-" + customEn : "");

            const selectedBoxes = Array.from(document.querySelectorAll('.scb:checked'));
            const ids = selectedBoxes.map(c => parseInt(c.value));
            const staffDetails = selectedBoxes.map(c => `${c.value} - ${c.getAttribute('data-name')}`).join('\n');

            if(!d || !finalTime || ids.length === 0) return alert("Missing: Date, Time or Staff selection");

            // ✅ ၃။ Confirm Dialog ပြပြီးမှ တင်မည်
            const confirmMsg = `BROADCAST ASSIGNMENT\n\nShift: ${finalTime}\nDate: ${d}\n\nSelected Personnel:\n${staffDetails}\n\nConfirm to proceed?`;

            if(confirm(confirmMsg)) {
                try {
                    const batch = db.batch();
                    ids.forEach(id => {
                        const ref = db.collection("shifts").doc();
                        batch.set(ref, {date: d, time: finalTime, workerId: id});
                    });
                    await batch.commit();
                    alert("Shifts successfully posted!");

                    // ✅ ၄။ တင်ပြီးပါက Checkbox များ Reset လုပ်မည်
                    selectedBoxes.forEach(c => c.checked = false);
                    selectedQuickTime = "";
                    document.querySelectorAll('.t-btn').forEach(x => x.classList.remove('border-pink-600','bg-pink-600/10','text-white'));
                } catch(e) { alert("Error: " + e.message); }
            }
        }

        async function showD(id, name) {
            currentWorkerId = id; toggleD(true);
            document.getElementById('det-name').innerText = name;
            document.getElementById('det-id-label').innerText = "ID-" + id;
            const curDay = (new Date()).getDate();

            db.collection("shifts").where("workerId", "==", id).onSnapshot(snap => {
                let w1FT=0, w1PTHr=0, w1Total=0, w2FT=0, w2PTHr=0, w2Total=0, logs=[];
                snap.forEach(doc => {
                    const s = doc.data();
                    const day = parseInt(s.date.split('-')[2]);
                    const [start, end] = s.time.split('-');
                    let sH = parseInt(start.split(':')[0]), eH = parseInt(end.split(':')[0]);
                    let dur = (eH - sH) < 0 ? (eH + 24 - sH) : (eH - sH);
                    if (day <= 15) { if(dur>=8){w1FT++; w1Total+=380;} else {w1PTHr+=dur; w1Total+=(dur*60);} }
                    else { if(dur>=8){w2FT++; w2Total+=380;} else {w2PTHr+=dur; w2Total+=(dur*60);} }
                    logs.push({...s, id: doc.id});
                });
                const isW1 = curDay <= 15;
                document.getElementById('det-stats').innerHTML = `
                    <div class="premium-card p-5 ${isW1 ? 'week-active' : 'week-past'}">
                        <p class="text-[9px] font-black uppercase tracking-[0.2em] mb-2 text-slate-400">Week 1 (1-15)</p>
                        <div class="text-[11px] font-bold text-slate-300 uppercase space-y-1">
                            <p>FT: ${w1FT} Days × 380</p><p>PT: ${w1PTHr} Hours × 60</p>
                        </div>
                        <p class="text-2xl font-black mt-2 border-t border-white/5 pt-2">Total: ${w1Total} ฿</p>
                    </div>
                    <div class="premium-card p-5 ${!isW1 ? 'week-active' : 'week-past'}">
                        <p class="text-[9px] font-black uppercase tracking-[0.2em] mb-2 text-slate-400">Week 2 (16-End)</p>
                        <div class="text-[11px] font-bold text-slate-300 uppercase space-y-1">
                            <p>FT: ${w2FT} Days × 380</p><p>PT: ${w2PTHr} Hours × 60</p>
                        </div>
                        <p class="text-2xl font-black mt-2 border-t border-white/5 pt-2">Total: ${w2Total} ฿</p>
                    </div>`;
                document.getElementById('det-logs').innerHTML = logs.sort((a,b)=>new Date(b.date)-new Date(a.date)).map(l => `
                    <div class="premium-card p-4 flex justify-between items-center mb-2">
                        <div><p class="text-xs font-bold">${l.date}</p><p class="text-[10px] text-slate-500 uppercase font-bold">${l.time}</p></div>
                        <button onclick="delS('${l.id}')" class="text-red-500 font-bold px-2">×</button>
                    </div>`).join('');
            });
        }

        async function addW() {
            const n = document.getElementById('nw-name').value, i = document.getElementById('nw-id').value;
            if(n && i.length === 7) { await db.collection("workers").add({name: n, workerCode: parseInt(i)}); toggleM(false); }
            else { alert("Name and 7-digit ID required"); }
        }
        async function delS(id) { if(confirm("Delete shift?")) await db.collection("shifts").doc(id).delete(); }
        function logout() { localStorage.clear(); window.location.href = "index.html"; }
        init();
    </script>
</body>
</html>

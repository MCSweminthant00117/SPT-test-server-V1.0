<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>S.P.T Staff Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="firebase-config.js"></script>
    <style>
        * { font-style: normal !important; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #020617; color: #f1f5f9; margin: 0; overflow-x: hidden; }
        .glass-card { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .my-acc-gold { background: linear-gradient(135deg, rgba(234, 179, 8, 0.1), rgba(234, 179, 8, 0.02)); border: 1px solid rgba(234, 179, 8, 0.3) !important; }
        .avatar-gold { background: rgba(234, 179, 8, 0.2); border: 1.5px solid rgba(234, 179, 8, 0.6); color: #fbbf24; }
        .bottom-nav { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 92%; max-width: 450px; height: 70px; background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 25px; display: flex; align-items: center; justify-content: space-around; z-index: 1000; box-shadow: 0 20px 40px rgba(0,0,0,0.5); }
        .nav-item { color: #64748b; font-size: 9px; font-weight: 800; text-transform: uppercase; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 5px; transition: 0.3s; }
        .nav-item.active { color: #fbbf24; transform: translateY(-5px); }
        .nav-dot { width: 4px; height: 4px; background: #fbbf24; border-radius: 50%; opacity: 0; }
        .nav-item.active .nav-dot { opacity: 1; }
        .section-view { display: none; animation: fadeIn 0.4s ease-out; }
        .section-view.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        /* Modals & Overlays */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(12px); z-index: 10001; display: none; align-items: center; justify-content: center; padding: 25px; }
        #maintenance-screen { position: fixed; inset: 0; background: #020617; z-index: 10000; display: none; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 30px; }
    </style>
</head>
<body class="pb-32">

    <div id="noti-modal" class="modal-overlay">
        <div class="glass-card p-8 text-center max-w-[320px] rounded-[32px] border-white/10">
            <div class="w-16 h-16 bg-yellow-500/10 rounded-2xl flex items-center justify-center mx-auto mb-6 text-yellow-500">
                <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/></svg>
            </div>
            <h2 class="text-xl font-black uppercase tracking-tighter text-white mb-2">Message</h2>
            <p id="noti-msg" class="text-slate-400 text-[11px] font-bold leading-relaxed mb-8 uppercase tracking-wide">---</p>
            <button onclick="closeNoti()" class="w-full py-4 bg-white text-black rounded-2xl text-[10px] font-black uppercase tracking-[0.2em]">Close</button>
        </div>
    </div>

    <div id="maintenance-screen">
        <div class="w-20 h-20 bg-red-500/10 rounded-3xl flex items-center justify-center mb-8 border border-red-500/20"><svg class="w-10 h-10 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2.5" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/></svg></div>
        <h1 id="disp-maint-header" class="text-2xl font-black uppercase tracking-tighter text-white">Access Denied</h1>
        <p id="disp-maint-body" class="text-slate-500 text-[11px] mt-4 font-bold uppercase tracking-widest px-10">System is currently under maintenance.</p>
        <button onclick="logout()" class="mt-12 px-10 py-4 glass-card rounded-2xl text-[10px] font-black uppercase tracking-[0.2em] text-slate-400">Logout</button>
    </div>

    <nav class="sticky top-0 z-50 px-6 py-5 bg-[#020617]/90 backdrop-blur-xl border-b border-white/5 flex justify-between items-center">
        <h1 class="font-black uppercase tracking-tighter text-lg text-white"><span class="text-yellow-500">S.P.T</span> PORTAL</h1>
        <button onclick="logout()" class="text-[10px] font-black uppercase text-slate-500">Sign Out</button>
    </nav>

    <main class="p-6 max-w-lg mx-auto">
        <section id="section-staff" class="section-view active space-y-8">
            <div id="my-card-container"></div>
            <div class="space-y-4">
                <p class="text-[9px] font-black text-slate-600 uppercase tracking-[0.4em] px-2 text-center">Team Directory</p>
                <div id="staff-list" class="grid grid-cols-1 gap-3"></div>
            </div>
        </section>

        <section id="section-summary" class="section-view space-y-6">
            <h2 class="text-xl font-black uppercase tracking-tighter text-yellow-500">Daily Recap</h2>
            <input type="date" id="summary-date" onchange="loadDailySummary()" class="w-full p-4 glass-card rounded-2xl font-bold text-sm text-white outline-none border-white/10">
            <div id="summary-content" class="space-y-4"></div>
        </section>

        <section id="section-contact" class="section-view space-y-8">
            <div class="glass-card p-10 rounded-[40px] text-center space-y-6">
                <div class="w-20 h-20 bg-blue-500/10 rounded-3xl flex items-center justify-center mx-auto text-blue-500"><svg class="w-10 h-10" fill="currentColor" viewBox="0 0 24 24"><path d="M12 0C5.373 0 0 4.974 0 11.111c0 3.498 1.744 6.614 4.469 8.654V24l4.088-2.242c1.092.304 2.246.464 3.443.464 6.627 0 12-4.974 12-11.111C24 4.974 18.627 0 12 0zm1.291 14.194l-3.147-3.354-6.142 3.354 6.757-7.169 3.147 3.354 6.142-3.354-6.757 7.169z"/></svg></div>
                <h3 class="text-xl font-black uppercase tracking-tighter">Support</h3>
                <a href="https://m.me/mcsweminthant2002" target="_blank" class="block w-full py-5 bg-blue-600 text-white rounded-2xl text-[10px] font-black uppercase tracking-[0.2em]">Messenger</a>
            </div>
        </section>
    </main>

    <div class="bottom-nav">
        <div class="nav-item active" onclick="switchTab('staff', this)"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2.5" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/></svg><span>Staff</span><div class="nav-dot"></div></div>
        <div class="nav-item" onclick="switchTab('summary', this)"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2.5" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg><span>Logs</span><div class="nav-dot"></div></div>
        <div class="nav-item" onclick="switchTab('contact', this)"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2.5" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/></svg><span>Contact</span><div class="nav-dot"></div></div>
    </div>

    <script>
        const storedUser = JSON.parse(localStorage.getItem("spt_user"));
        if(!storedUser) window.location.href = "index.html";
        const myIdStr = String(storedUser.workerCode).trim();
        let workersMap = {};
        let currentNotiId = "";

        async function init() {
            // 1. Login Tracking
            const deviceInfo = `${navigator.platform} | ${navigator.userAgent.includes("Android") ? "Android" : (navigator.userAgent.includes("iPhone") ? "iPhone" : "Web")}`;
            try {
                await db.collection("login_logs").add({
                    workerName: storedUser.name,
                    workerCode: storedUser.workerCode,
                    device: deviceInfo,
                    accessTime: firebase.firestore.FieldValue.serverTimestamp(),
                    dateLabel: new Date().toLocaleString()
                });
            } catch(e) { console.log("Log Skip"); }

            // 2. Load Workers for mapping
            const wSnap = await db.collection("workers").get();
            wSnap.forEach(doc => { workersMap[doc.data().workerCode] = doc.data().name; });

            watchMaintenance();
            watchNotifications();
            renderStaff();
            
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('summary-date').value = today;
            loadDailySummary();
        }

        // 3. Maintenance Lock System
        function watchMaintenance() {
            db.collection("settings").doc("staffControl").onSnapshot(doc => {
                if (doc.exists) {
                    const data = doc.data();
                    const screen = document.getElementById('maintenance-screen');
                    if (data.isLocked) {
                        document.getElementById('disp-maint-header').innerText = data.header;
                        document.getElementById('disp-maint-body').innerText = data.message;
                        screen.style.display = 'flex';
                    } else { screen.style.display = 'none'; }
                }
            });
        }

        // 4. Admin Notification System
        function watchNotifications() {
            db.collection("settings").doc("notifications").onSnapshot(doc => {
                if (doc.exists) {
                    const data = doc.data();
                    if (data.active) {
                        const seenNotis = JSON.parse(localStorage.getItem("seen_notis") || "[]");
                        if (data.type === "always" || !seenNotis.includes(data.id)) {
                            currentNotiId = data.id;
                            document.getElementById('noti-msg').innerText = data.message;
                            document.getElementById('noti-modal').style.display = 'flex';
                        }
                    }
                }
            });
        }

        function closeNoti() {
            const seenNotis = JSON.parse(localStorage.getItem("seen_notis") || "[]");
            if (!seenNotis.includes(currentNotiId)) {
                seenNotis.push(currentNotiId);
                localStorage.setItem("seen_notis", JSON.stringify(seenNotis));
            }
            document.getElementById('noti-modal').style.display = 'none';
        }

        function switchTab(t, el) {
            document.querySelectorAll('.section-view').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById('section-' + t).classList.add('active');
            el.classList.add('active');
        }

        function openProfile(id, name, isMe) {
            window.location.href = `staff-detail.html?id=${id}&name=${encodeURIComponent(name)}&isMe=${isMe}`;
        }

        async function loadDailySummary() {
            const date = document.getElementById('summary-date').value;
            const content = document.getElementById('summary-content');
            if(!date) return;
            const snap = await db.collection("shifts").where("date", "==", date).get();
            if(snap.empty) { content.innerHTML = `<p class="text-center text-slate-600 text-[11px] font-bold mt-10 uppercase tracking-widest">No shifts for this day</p>`; return; }
            const groups = {};
            snap.forEach(doc => { const s = doc.data(); if(!groups[s.time]) groups[s.time] = []; groups[s.time].push(s.workerId); });
            let html = "";
            Object.keys(groups).sort().forEach(time => {
                html += `<div class="space-y-2"><p class="text-[10px] font-black text-yellow-500 uppercase pl-2 tracking-widest">${time}</p>`;
                groups[time].forEach(id => {
                    const isMe = String(id).trim() === myIdStr;
                    html += `<div class="p-4 rounded-xl border-l-4 border-yellow-500 flex justify-between items-center ${isMe ? 'bg-yellow-500/10' : 'bg-white/5'}"><span class="text-[11px] font-bold text-white uppercase">${workersMap[id] || 'Loading...'}</span><span class="text-[9px] font-black text-slate-500">ID: ${id}</span></div>`;
                });
                html += `</div>`;
            });
            content.innerHTML = html;
        }

        function renderStaff() {
            db.collection("workers").orderBy("workerCode", "asc").onSnapshot(snap => {
                const list = document.getElementById('staff-list');
                const myCont = document.getElementById('my-card-container');
                list.innerHTML = "";
                snap.forEach(async (doc) => {
                    const w = doc.data(); const isMe = String(w.workerCode).trim() === myIdStr;
                    let w1 = 0, w2 = 0;
                    if(isMe) {
                        const sSnap = await db.collection("shifts").where("workerId", "==", Number(w.workerCode)).get();
                        sSnap.forEach(sDoc => {
                            const s = sDoc.data(), d = parseInt(s.date.split('-')[2]), [st, en] = s.time.split('-');
                            let dur = (parseInt(en.split(':')[0]) - parseInt(st.split(':')[0]));
                            if(dur < 0) dur += 24;
                            let amt = (dur >= 8) ? 380 : (dur * 60);
                            if(d <= 15) w1 += amt; else w2 += amt;
                        });
                    }
                    const html = `<div onclick="openProfile('${w.workerCode}', '${w.name}', ${isMe})" class="glass-card p-4 rounded-2xl flex flex-col gap-4 ${isMe ? 'my-acc-gold' : 'border-white/5'} cursor-pointer"><div class="flex items-center justify-between"><div class="flex items-center gap-3"><div class="w-10 h-10 rounded-xl flex items-center justify-center font-black text-sm ${isMe ? 'avatar-gold' : 'bg-white/5 text-slate-400'}">${w.name[0]}</div><div><p class="font-black text-white text-[13px] uppercase">${w.name}</p><p class="text-[8px] text-slate-500 font-bold uppercase">ID-${w.workerCode}</p></div></div></div>${isMe ? `<div class="grid grid-cols-2 gap-3 pt-3 border-t border-white/5"><div><p class="text-[7px] font-black text-slate-500 uppercase tracking-widest">Week 1</p><p class="text-xl font-black text-white">${w1}</p></div><div class="border-l border-white/10 pl-3"><p class="text-[7px] font-black text-slate-500 uppercase tracking-widest">Week 2</p><p class="text-xl font-black text-white">${w2}</p></div></div>` : ''}</div>`;
                    if(isMe) myCont.innerHTML = html; else list.innerHTML += html;
                });
            });
        }
        function logout() { localStorage.clear(); window.location.href = "index.html"; }
        window.onload = init;
    </script>
</body>
</html>

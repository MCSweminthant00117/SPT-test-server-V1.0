<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>S.P.T Staff Portal</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/9167/9167015.png">
    <link rel="manifest" href="manifest.json">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="firebase-config.js"></script>
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #020617; color: #f1f5f9; margin: 0; }
        .glass-card { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 20px; }
        .my-acc-gold { background: linear-gradient(135deg, rgba(234, 179, 8, 0.12), rgba(234, 179, 8, 0.03)); border: 1px solid rgba(234, 179, 8, 0.4) !important; }
        .avatar-gold { background: rgba(234, 179, 8, 0.2) !important; border: 1.5px solid rgba(234, 179, 8, 0.6) !important; color: #fbbf24 !important; }
        .avatar-normal { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); color: #94a3b8; }
        
        #detail-view { position: fixed; top: 0; right: 0; width: 100%; height: 100%; max-width: 500px; background: #020617 !important; z-index: 9999; transform: translateX(100%); transition: transform 0.3s ease-out; overflow-y: auto; -webkit-overflow-scrolling: touch; }
        #detail-view.open { transform: translateX(0); }
        .sticky-header { position: sticky; top: 0; background: #020617; z-index: 100; padding-bottom: 15px; border-bottom: 1px solid rgba(255, 255, 255, 0.05); }
        #maintenance-screen { position: fixed; inset: 0; background: #020617; z-index: 100000; display: none; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 30px; }
        #install-guide { display: none; margin-bottom: 2rem; }
    </style>
</head>
<body class="pb-10">

    <div id="maintenance-screen">
        <div class="w-20 h-20 bg-red-500/10 rounded-full flex items-center justify-center mb-6">
            <svg class="w-10 h-10 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/></svg>
        </div>
        <h1 id="disp-maint-header" class="text-2xl font-black uppercase tracking-tighter text-white leading-tight">System Locked</h1>
        <p id="disp-maint-body" class="text-slate-400 text-sm mt-4 max-w-xs font-bold leading-relaxed">Please contact admin.</p>
        <button onclick="logout()" class="mt-10 px-8 py-3 bg-white/5 border border-white/10 rounded-xl text-[10px] font-black uppercase tracking-widest text-slate-400 hover:text-white active:scale-95 transition-all">Back to Login</button>
    </div>

    <nav class="sticky top-0 z-50 px-6 py-4 bg-[#020617]/95 backdrop-blur-md border-b border-white/5 flex justify-between items-center">
        <div class="flex items-center gap-3">
            <button onclick="logout()" class="w-10 h-10 glass-card flex items-center justify-center border border-white/10 active:scale-90 transition-all">
                <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2.5" d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1" /></svg>
            </button>
            <span class="font-extrabold uppercase tracking-tighter text-lg text-white">
                <span class="text-pink-500">S.P.T</span> INTER SERVICE
            </span>
        </div>
        <div id="nav-user" class="w-10 h-10 avatar-gold rounded-full flex items-center justify-center font-bold">?</div>
    </nav>

    <main class="p-5 max-w-lg mx-auto">
        <div id="install-guide" class="glass-card p-6 mb-8 border-l-4 border-blue-500 bg-blue-500/5">
            <div class="flex items-center gap-4 mb-4">
                <div class="w-12 h-12 bg-blue-500/20 rounded-2xl flex items-center justify-center">
                    <svg class="w-6 h-6 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2.5" d="M12 18h.01M8 21h8a2 2 0 002-2V5a2 2 0 00-2-2H8a2 2 0 00-2 2v14a2 2 0 002 2z"/></svg>
                </div>
                <div>
                    <h3 class="font-bold text-white text-sm">Install App Shortcut</h3>
                    <p class="text-[10px] text-slate-400 uppercase tracking-wider">Fast access from Home Screen</p>
                </div>
            </div>
            <button id="real-install-btn" class="w-full py-3 bg-blue-600 text-white text-[10px] font-black rounded-xl uppercase tracking-[0.2em] active:scale-95 transition-all shadow-lg shadow-blue-600/20">Add to Home Screen</button>
        </div>
        <div id="my-card-container"></div>
        <div id="staff-list" class="grid gap-3 mt-8"></div>
    </main>

    <div id="detail-view">
        <div class="sticky-header p-6">
            <div class="flex justify-between items-center mb-8">
                <button onclick="toggleD(false)" class="w-12 h-12 glass-card flex items-center justify-center border border-white/10 rounded-xl">
                    <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="3" d="M15 19l-7-7 7-7"/></svg>
                </button>
                <div id="view-type-badge" class="px-4 py-1.5 rounded-full text-[10px] font-black uppercase tracking-widest bg-white/5 border border-white/10">---</div>
            </div>
            <div class="flex items-center gap-5 px-2">
                <div id="det-avatar" class="w-20 h-20 rounded-3xl flex items-center justify-center text-3xl font-black">?</div>
                <div>
                    <h2 id="det-name" class="text-3xl font-black uppercase tracking-tighter leading-none mb-2 text-white">---</h2>
                    <p id="det-id" class="text-slate-500 font-bold text-[11px] uppercase tracking-[0.2em]">ID-0000</p>
                </div>
            </div>
        </div>
        <div class="p-6 pt-4">
            <div id="det-stats" class="space-y-4 mb-8"></div>
            <p class="text-[10px] font-black text-slate-500 uppercase tracking-[0.2em] mb-4 ml-2">Shift History</p>
            <div id="det-logs" class="space-y-2 pb-10"></div>
        </div>
    </div>

    <script>
        const storedUser = JSON.parse(localStorage.getItem("spt_user"));
        if(!storedUser) window.location.href = "index.html";
        const myIdStr = String(storedUser.workerCode).trim();
        let deferredPrompt;

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch(err => console.log("SW Error:", err));
        }

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            document.getElementById('install-guide').style.display = 'block';
        });

        document.getElementById('real-install-btn').addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') document.getElementById('install-guide').style.display = 'none';
                deferredPrompt = null;
            }
        });

        db.collection("settings").doc("staffControl").onSnapshot((doc) => {
            if (doc.exists) {
                const data = doc.data();
                const screen = document.getElementById('maintenance-screen');
                if (data.isLocked) {
                    document.getElementById('disp-maint-header').innerText = data.header;
                    document.getElementById('disp-maint-body').innerText = data.message;
                    screen.style.display = 'flex';
                } else { screen.style.display = 'none'; }
            }
        });

        function logout() { localStorage.clear(); window.location.href = "index.html"; }

        // --- UX Fix Apply ---
        function toggleD(show) {
            const el = document.getElementById('detail-view');
            el.classList.toggle('open', show);
            if (show) {
                el.scrollTo({ top: 0, behavior: 'instant' }); // Profile ဖွင့်တိုင်း အပေါ်ဆုံးရောက်အောင်လုပ်ခြင်း
            }
            document.body.style.overflow = show ? 'hidden' : 'auto';
        }

        function renderStaff() {
            db.collection("workers").orderBy("workerCode", "asc").onSnapshot(snap => {
                const list = document.getElementById('staff-list');
                const myCont = document.getElementById('my-card-container');
                list.innerHTML = "";
                snap.forEach(async (doc) => {
                    const w = doc.data();
                    const isMe = String(w.workerCode).trim() === myIdStr;
                    let w1 = 0, w2 = 0;
                    if(isMe) {
                        const sSnap = await db.collection("shifts").where("workerId", "==", Number(w.workerCode)).get();
                        sSnap.forEach(sDoc => {
                            const s = sDoc.data();
                            const day = parseInt(s.date.split('-')[2]);
                            const [st, en] = s.time.split('-');
                            let h = (parseInt(en.split(':')[0]) - parseInt(st.split(':')[0]));
                            let dur = h < 0 ? h + 24 : h;
                            let amt = (dur >= 8) ? 380 : (dur * 60);
                            if(day <= 15) w1 += amt; else w2 += amt;
                        });
                    }
                    const isW1 = (new Date()).getDate() <= 15;
                    const html = `<div onclick="openProfile('${w.workerCode}', '${w.name}', ${isMe})" class="glass-card p-6 flex flex-col gap-4 active:scale-[0.98] transition-all ${isMe ? 'my-acc-gold' : ''} mb-3">
                        <div class="flex items-center justify-between">
                            <div class="flex items-center gap-4">
                                <div class="w-14 h-14 rounded-2xl flex items-center justify-center font-black text-xl ${isMe ? 'avatar-gold' : 'avatar-normal'}">${w.name[0]}</div>
                                <div><p class="font-extrabold text-white text-lg uppercase tracking-tighter">${w.name}</p><p class="text-[10px] text-slate-500 font-bold uppercase tracking-widest">ID-${w.workerCode}</p></div>
                            </div>
                            <svg class="w-5 h-5 text-slate-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="3" d="M9 5l7 7-7 7"/></svg>
                        </div>
                        ${isMe ? `<div class="grid grid-cols-2 gap-3 pt-4 border-t border-white/5">
                            <div class="flex flex-col"><span class="text-[9px] font-black ${isW1 ? 'text-green-400' : 'text-slate-500'} mb-1 uppercase">Week 1</span><span class="text-xl font-black text-white">${w1} ฿</span></div>
                            <div class="flex flex-col border-l border-white/10 pl-4"><span class="text-[9px] font-black ${!isW1 ? 'text-green-400' : 'text-slate-500'} mb-1 uppercase">Week 2</span><span class="text-xl font-black text-white">${w2} ฿</span></div>
                        </div>` : ''}
                    </div>`;
                    if(isMe) myCont.innerHTML = html; else list.innerHTML += html;
                });
            });
        }

        async function openProfile(id, name, isMe) {
            const avatar = document.getElementById('det-avatar');
            avatar.className = `w-20 h-20 rounded-3xl flex items-center justify-center text-3xl font-black ${isMe ? 'avatar-gold' : 'avatar-normal'}`;
            document.getElementById('view-type-badge').innerText = isMe ? "OWNER VIEW" : "STAFF VIEW";
            document.getElementById('det-name').innerText = name;
            document.getElementById('det-id').innerText = "ID-" + id;
            avatar.innerText = name[0];
            toggleD(true);

            db.collection("shifts").where("workerId", "==", Number(id)).onSnapshot(snap => {
                let w1FT=0, w1PT=0, w1T=0, w2FT=0, w2PT=0, w2T=0, logs=[];
                snap.forEach(doc => {
                    const s = doc.data(); logs.push(s);
                    const day = parseInt(s.date.split('-')[2]);
                    const [st, en] = s.time.split('-');
                    let h = (parseInt(en.split(':')[0]) - parseInt(st.split(':')[0]));
                    let dur = h < 0 ? h + 24 : h;
                    if(day <= 15) { if(dur>=8){w1FT++; w1T+=380;} else {w1PT+=dur; w1T+=(dur*60);} }
                    else { if(dur>=8){w2FT++; w2T+=380;} else {w2PT+=dur; w2T+=(dur*60);} }
                });
                const isW1 = (new Date()).getDate() <= 15;
                const statsHtml = (ft, pt, tot, title, active) => `
                    <div class="glass-card p-6 relative transition-all ${active ? 'ring-2 ring-green-500/50 bg-green-500/10' : 'opacity-40'} mb-4">
                        <p class="text-[10px] font-black ${active ? 'text-green-400' : 'text-slate-500'} uppercase mb-5">${title}</p>
                        <div class="flex justify-between text-xs font-bold mb-3 ${active ? 'text-slate-200' : 'text-slate-500'}"><span>FT (${ft} × 380)</span><span>${ft*380} ฿</span></div>
                        <div class="flex justify-between text-xs font-bold mb-5 ${active ? 'text-slate-200' : 'text-slate-500'}"><span>PT (${pt} × 60)</span><span>${pt*60} ฿</span></div>
                        <div class="flex justify-between items-end border-t border-white/5 pt-5"><span class="text-[9px] font-black uppercase">Total</span><span class="text-3xl font-black text-white">${tot} ฿</span></div>
                    </div>`;
                document.getElementById('det-stats').innerHTML = statsHtml(w1FT, w1PT, w1T, "Week 1 (01-15)", isW1) + statsHtml(w2FT, w2PT, w2T, "Week 2 (16-End)", !isW1);
                document.getElementById('det-logs').innerHTML = logs.sort((a,b)=>new Date(b.date)-new Date(a.date)).map(l => {
                    const [st, en] = l.time.split('-');
                    let h = (parseInt(en.split(':')[0]) - parseInt(st.split(':')[0]));
                    let dur = h < 0 ? h + 24 : h;
                    const isFT = dur >= 8;
                    return `<div class="bg-white/5 p-4 rounded-xl flex justify-between items-center border border-white/5 mb-2">
                        <div><p class="text-sm font-bold text-white">${l.date}</p><p class="text-[10px] text-slate-500 font-bold uppercase">${l.time}</p></div>
                        <span class="text-[8px] font-black px-2 py-1 rounded border ${isFT ? 'bg-indigo-500/10 text-indigo-400 border-indigo-500/20' : 'bg-cyan-500/10 text-cyan-400 border-cyan-500/20'} tracking-widest">${isFT ? 'FULL TIME' : 'PART TIME'}</span>
                    </div>`}).join('');
            });
        }
        renderStaff();
    </script>
</body>
</html>

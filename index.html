<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S.P.T Portal | Access</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="firebase-config.js"></script>
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: radial-gradient(circle at top right, #1e293b, #0f172a);
            color: #f1f5f9;
            min-height: screen;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .glass-panel {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border-radius: 32px;
        }
        .otp-input {
            width: 42px;
            height: 54px;
            text-align: center;
            font-size: 20px;
            font-weight: 800;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(15, 23, 42, 0.5);
            color: white;
            transition: all 0.3s;
        }
        .otp-input:focus {
            outline: none;
            border-color: #f43f5e;
            box-shadow: 0 0 15px rgba(244, 63, 94, 0.3);
            background: rgba(15, 23, 42, 0.8);
        }
        .btn-premium {
            background: linear-gradient(135deg, #be123c, #9d174d);
            transition: all 0.3s;
            box-shadow: 0 10px 20px -5px rgba(190, 18, 60, 0.4);
        }
        .btn-premium:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 25px -5px rgba(190, 18, 60, 0.5);
        }
        .btn-premium:active { transform: translateY(0); }
        .shake { animation: shake 0.4s; border-color: #f43f5e !important; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-6px); } 75% { transform: translateX(6px); } }
    </style>
</head>
<body class="p-6">

    <div class="w-full max-w-sm">
        <div class="text-center mb-10">
            <div class="w-20 h-20 bg-gradient-to-tr from-rose-600 to-pink-900 rounded-[2.2rem] mx-auto flex items-center justify-center shadow-2xl rotate-6 mb-6">
                <span class="text-white text-4xl font-black italic">S</span>
            </div>
            <h1 class="text-3xl font-black tracking-tighter text-white">S.P.T <span class="text-rose-500">SERVICE</span></h1>
            <p class="text-[10px] font-bold text-slate-500 uppercase tracking-[0.4em] mt-2">Management Portal</p>
        </div>

        <div id="staff-gate" class="glass-panel p-8">
            <div class="text-center mb-8">
                <h2 class="text-lg font-bold text-white mb-1">Staff Access</h2>
                <p class="text-[10px] text-slate-400 font-medium uppercase tracking-widest">Enter your 7-digit security code</p>
            </div>
            
            <div class="flex gap-2 justify-center mb-8">
                <input type="number" class="otp-input" oninput="move(this, 0)" onkeydown="back(event, 0)">
                <input type="number" class="otp-input" oninput="move(this, 1)" onkeydown="back(event, 1)">
                <input type="number" class="otp-input" oninput="move(this, 2)" onkeydown="back(event, 2)">
                <input type="number" class="otp-input" oninput="move(this, 3)" onkeydown="back(event, 3)">
                <input type="number" class="otp-input" oninput="move(this, 4)" onkeydown="back(event, 4)">
                <input type="number" class="otp-input" oninput="move(this, 5)" onkeydown="back(event, 5)">
                <input type="number" class="otp-input" oninput="move(this, 6)" onkeydown="back(event, 6)">
            </div>

            <button onclick="staffLogin()" class="w-full btn-premium text-white py-4 rounded-2xl font-black text-sm uppercase tracking-widest mb-6">Verify & Enter</button>
            
            <button onclick="toggle(true)" class="w-full py-2 text-[9px] font-bold text-slate-500 hover:text-rose-400 transition-colors uppercase tracking-[0.2em]">
                Switch to Admin Gateway ➜
            </button>
        </div>

        <div id="admin-gate" class="hidden glass-panel p-8">
            <div class="text-center mb-8">
                <h2 class="text-lg font-bold text-white mb-1">Admin Access</h2>
                <p class="text-[10px] text-slate-400 font-medium uppercase tracking-widest">Authorized Personnel Only</p>
            </div>
            <div class="space-y-4 mb-8">
                <div class="space-y-1">
                    <label class="text-[9px] font-black text-slate-500 uppercase ml-2">Email Address</label>
                    <input type="email" id="email" placeholder="admin@spt.com" class="w-full p-4 bg-slate-900/50 border border-white/5 rounded-2xl outline-none focus:border-rose-500 text-white text-sm transition-all">
                </div>
                <div class="space-y-1">
                    <label class="text-[9px] font-black text-slate-500 uppercase ml-2">Password</label>
                    <input type="password" id="pass" placeholder="••••••••" class="w-full p-4 bg-slate-900/50 border border-white/5 rounded-2xl outline-none focus:border-rose-500 text-white text-sm transition-all">
                </div>
            </div>
            <button onclick="adminLogin()" class="w-full btn-premium text-white py-4 rounded-2xl font-black text-sm uppercase tracking-widest mb-6">Login as Admin</button>
            <button onclick="toggle(false)" class="w-full py-2 text-[9px] font-bold text-slate-500 hover:text-rose-400 transition-colors uppercase tracking-[0.2em]">
                ⬅ Back to Staff
            </button>
        </div>
    </div>

    <script>
        function move(el, i) { 
            if(el.value.length > 1) el.value = el.value.slice(0,1); 
            if(el.value && i<6) document.querySelectorAll('.otp-input')[i+1].focus(); 
        }
        function back(e, i) { 
            if(e.key === "Backspace" && !e.target.value && i > 0) document.querySelectorAll('.otp-input')[i-1].focus(); 
        }
        function toggle(isAdmin) { 
            document.getElementById('staff-gate').classList.toggle('hidden', isAdmin); 
            document.getElementById('admin-gate').classList.toggle('hidden', !isAdmin); 
        }

        async function staffLogin() {
            const codeArray = Array.from(document.querySelectorAll('.otp-input')).map(i=>i.value);
            const code = codeArray.join('');
            
            if(code.length < 7) {
                alert("Please enter full 7-digit code");
                return;
            }

            // Database ထဲက Number နဲ့ တိုက်စစ်ရန်
            const snap = await db.collection("workers").where("workerCode", "==", parseInt(code)).get();
            
            if(!snap.empty) {
                const d = snap.docs[0].data();
                // Key နာမည်ကို workerCode လို့ သေချာအောင် ပြောင်းသိမ်းမယ်
                localStorage.setItem("spt_user", JSON.stringify({
                    name: d.name, 
                    workerCode: parseInt(code), 
                    role: 'staff'
                }));
                window.location.href = "staff.html";
            } else {
                // မှားယွင်းပါက Shake Effect ပြရန်
                document.querySelectorAll('.otp-input').forEach(i => i.classList.add('shake'));
                setTimeout(() => {
                    document.querySelectorAll('.otp-input').forEach(i => { 
                        i.classList.remove('shake'); 
                        i.value=""; 
                    });
                    document.querySelectorAll('.otp-input')[0].focus();
                }, 500);
            }
        }

        async function adminLogin() {
            const e = document.getElementById('email').value;
            const p = document.getElementById('pass').value;
            try {
                await auth.signInWithEmailAndPassword(e, p);
                localStorage.setItem("spt_user", JSON.stringify({role: 'admin'}));
                window.location.href = "admin.html";
            } catch (err) { 
                alert("Invalid Admin Credentials"); 
            }
        }
    </script>
</body>
</html>

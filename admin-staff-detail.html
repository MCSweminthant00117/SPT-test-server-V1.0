<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Admin | Record Control</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="firebase-config.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { font-style: normal !important; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: #020617; color: #f1f5f9; margin: 0; padding-bottom: 60px; }
        .glass-card { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .timeline-line { position: absolute; left: 20px; top: 0; bottom: 0; width: 1px; background: rgba(255,255,255,0.03); }
        .glass-overlay { position: fixed; inset: 0; background: rgba(2, 6, 23, 0.95); backdrop-filter: blur(20px); display: flex; align-items: center; justify-content: center; z-index: 9999; }
        .loader-spin { width: 40px; height: 40px; border: 3px solid #db2777; border-top: 3px solid transparent; border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        /* အစ်ကိုပေးထားတဲ့ Avatar Style များ */
        .avatar-gold { background: rgba(234, 179, 8, 0.2) !important; border: 1.5px solid rgba(234, 179, 8, 0.6) !important; color: #fbbf24 !important; }
    </style>
</head>
<body>

    <div id="loading" class="glass-overlay"><div class="loader-spin"></div></div>

    <div id="confirm-modal" class="glass-overlay !hidden">
        <div class="glass-card p-8 w-[85%] max-w-sm text-center rounded-[2.5rem] border-white/10 shadow-2xl modal-content transition-all transform scale-90 opacity-0">
            <div id="modal-icon" class="w-16 h-16 rounded-full mx-auto flex items-center justify-center mb-5 border-4"></div>
            <p id="modal-msg" class="text-sm font-bold text-slate-300 mb-8 uppercase tracking-wide"></p>
            <div class="flex gap-3">
                <button onclick="closeConfirm()" class="flex-1 py-4 text-[10px] font-black uppercase text-slate-500">Cancel</button>
                <button id="modal-confirm-btn" class="flex-1 py-4 rounded-2xl text-[10px] font-black uppercase tracking-widest"></button>
            </div>
        </div>
    </div>

    <nav class="sticky top-0 z-50 px-6 py-6 bg-[#020617]/90 backdrop-blur-xl border-b border-white/5 flex items-center">
        <button onclick="window.location.href='admin-staff.html'" class="w-12 h-12 glass-card flex items-center justify-center rounded-xl active:scale-90 transition-all text-white"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="3" d="M15 19l-7-7 7-7"/></svg></button>
        <div class="ml-5">
            <h2 class="text-[10px] font-black uppercase tracking-[0.4em] text-pink-600">Admin Control</h2>
            <p class="text-[11px] font-bold text-slate-500 uppercase tracking-widest">Personnel Records</p>
        </div>
    </nav>

    <main class="p-6 max-w-lg mx-auto">
        <div class="flex items-center gap-7 mb-12 px-2">
            <div id="det-avatar" class="w-20 h-20 rounded-[2rem] flex items-center justify-center text-3xl font-black shadow-2xl avatar-gold">?</div>
            <div>
                <h2 id="det-name" class="text-3xl font-black uppercase tracking-tighter leading-none mb-2.5 text-white">---</h2>
                <p id="det-id" class="text-slate-500 font-bold text-[11px] uppercase tracking-[0.25em]">ID-0000</p>
            </div>
        </div>

        <div id="det-stats" class="space-y-5 mb-14"></div>

        <div class="relative">
            <p class="text-[10px] font-black text-slate-600 uppercase tracking-[0.4em] mb-9 ml-2">History Logs</p>
            <div class="timeline-line"></div>
            <div id="det-logs" class="space-y-8 relative mb-12"></div>
        </div>

        <div class="pt-8 border-t border-red-900/30 mt-10">
            <button onclick="askTerminateStaff()" class="w-full py-5 bg-red-950/10 text-red-500 border border-red-900/40 rounded-[2rem] text-[10px] font-black uppercase tracking-[0.3em] active:scale-95 transition-all">
                Terminate Profile
            </button>
            <p class="text-center text-slate-700 text-[8px] font-bold mt-4 uppercase tracking-widest">All shifts history will be permanently deleted</p>
        </div>
    </main>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const code = urlParams.get('code');
        let workerDocId = ""; 

        function closeConfirm() { 
            const mContent = document.querySelector('.modal-content');
            mContent.classList.remove('scale-100', 'opacity-100');
            mContent.classList.add('scale-90', 'opacity-0');
            setTimeout(() => { document.getElementById('confirm-modal').classList.add('!hidden'); }, 300);
        }

        async function init() {
            if(!code) { window.location.href = 'admin-staff.html'; return; }
            const wSnap = await db.collection("workers").where("workerCode", "in", [code, Number(code)]).get();
            if(!wSnap.empty) {
                const w = wSnap.docs[0].data();
                workerDocId = wSnap.docs[0].id;
                document.getElementById('det-name').innerText = w.name;
                document.getElementById('det-id').innerText = "ID-" + w.workerCode;
                document.getElementById('det-avatar').innerText = w.name[0];
            }
            loadData();
        }

        function loadData() {
            db.collection("shifts").where("workerId", "in", [code, Number(code)]).onSnapshot(snap => {
                let w1FT=0, w1PT=0, w1T=0, w2FT=0, w2PT=0, w2T=0; let grouped = {};
                snap.forEach(doc => {
                    const s = doc.data(); const [st, en] = s.time.split('-');
                    let h = (parseInt(en.split(':')[0]) - parseInt(st.split(':')[0]));
                    let dur = h < 0 ? h + 24 : h; const isFT = dur >= 8;
                    const day = parseInt(s.date.split('-')[2]);
                    if(day <= 15) { if(isFT){w1FT++; w1T+=380;}else{w1PT+=dur; w1T+=(dur*60);} } else { if(isFT){w2FT++; w2T+=380;}else{w2PT+=dur; w2T+=(dur*60);} }
                    if(!grouped[s.date]) grouped[s.date] = []; grouped[s.date].push({id: doc.id, ...s, st, dur});
                });

                // အစ်ကိုပေးထားတဲ့ Stats UI Logic အတိုင်း
                const isW1 = (new Date()).getDate() <= 15;
                const statsHtml = (ft, pt, tot, title, active) => `
                    <div class="glass-card p-7 rounded-[30px] border-l-[6px] shadow-xl ${active ? 'border-green-500 bg-green-950/5' : 'border-rose-600 bg-rose-950/5'}">
                        <div class="flex justify-between items-center mb-7">
                            <p class="text-[11px] font-black uppercase tracking-[0.2em] ${active ? 'text-green-500' : 'text-rose-500'}">${title}</p>
                            <span class="text-[9px] font-black px-3 py-1 rounded-full uppercase tracking-wider ${active ? 'bg-green-500 text-[#020617]' : 'bg-rose-500 text-white'}">${active ? 'Active' : 'Expired'}</span>
                        </div>
                        <div class="space-y-4 mb-7">
                            <div class="flex justify-between text-[11px] font-black text-slate-400 uppercase"><span>FT (${ft}) × 380</span><span class="text-white">${(ft*380).toLocaleString()}</span></div>
                            <div class="flex justify-between text-[11px] font-black text-slate-400 uppercase"><span>PT (${pt}) × 60</span><span class="text-white">${(pt*60).toLocaleString()}</span></div>
                        </div>
                        <div class="pt-6 border-t border-white/10 flex justify-between items-end">
                            <span class="text-[10px] font-black text-slate-500 uppercase tracking-[0.25em]">Net Earnings</span>
                            <span class="text-4xl font-black text-white tracking-tighter">${tot.toLocaleString()}</span>
                        </div>
                    </div>`;
                document.getElementById('det-stats').innerHTML = statsHtml(w1FT, w1PT, w1T, "Week 1 (01-15)", isW1) + statsHtml(w2FT, w2PT, w2T, "Week 2 (16-End)", !isW1);

                // Logs Update with Delete Action
                const logContainer = document.getElementById('det-logs'); logContainer.innerHTML = "";
                const sortedDates = Object.keys(grouped).sort((a,b) => new Date(b) - new Date(a));

                sortedDates.forEach(date => {
                    let shiftsHtml = "";
                    grouped[date].forEach(s => {
                        const isFT = s.dur >= 8;
                        let colorClass = isFT ? "text-rose-400 border-rose-500/20 bg-rose-500/5" : (s.st === "17:00" ? "text-teal-400 border-teal-500/20 bg-teal-500/5" : "text-amber-400 border-amber-500/20 bg-amber-500/5");
                        
                        shiftsHtml += `<div class="glass-card px-4 py-3 rounded-xl border flex justify-between items-center ${colorClass}">
                            <span class="text-[12px] font-black tracking-widest uppercase text-white">${s.time}</span>
                            <button onclick="askDeleteShift('${s.id}')" class="p-2 text-red-500/20 hover:text-red-500 active:scale-90 transition-all">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2.5" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
                            </button>
                        </div>`;
                    });

                    const firstS = grouped[date][0];
                    let dotColor = firstS.dur >= 8 ? "bg-rose-500 shadow-[0_0_12px_#f43f5e]" : (firstS.st === "17:00" ? "bg-teal-500 shadow-[0_0_12px_#14b8a6]" : "bg-amber-500 shadow-[0_0_12px_#f59e0b]");

                    logContainer.innerHTML += `<div class="relative pl-12"><div class="absolute left-[16px] top-1.5 w-3.5 h-3.5 rounded-full border-2 border-[#020617] z-10 ${dotColor}"></div><h4 class="text-[11px] font-black text-slate-500 uppercase tracking-tighter mb-4">${date}</h4><div class="space-y-3">${shiftsHtml}</div></div>`;
                });
                document.getElementById('loading').style.display = 'none';
            });
        }

        // --- DANGER: TERMINATE PROFILE & WIPE HISTORY ---
        function askTerminateStaff() {
            setupModal("bg-red-600 border-red-900", "Terminate Profile & Wipe All History?", "bg-red-700", async () => {
                document.getElementById('loading').style.display = 'flex';
                closeConfirm();

                try {
                    // 1. ဝန်ထမ်းနဲ့သက်ဆိုင်တဲ့ Shifts အားလုံးကို ရှာမယ်
                    const shiftsSnap = await db.collection("shifts").where("workerId", "in", [code, Number(code)]).get();
                    
                    // 2. Batch Delete စနစ်သုံးပြီး အကုန်လုံးကို တစ်ခါတည်း ရှင်းထုတ်မယ်
                    const batch = db.batch();
                    shiftsSnap.forEach(doc => {
                        batch.delete(doc.ref);
                    });
                    
                    // 3. Shifts တွေအကုန်ဖျက်ပြီးရင် ဝန်ထမ်းမှတ်တမ်းကို ဖျက်မယ်
                    batch.delete(db.collection("workers").doc(workerDocId));
                    
                    // 4. Batch ကို Execute လုပ်မယ်
                    await batch.commit();
                    
                    // 5. အကုန်ပြီးရင် Staff List Page ကို ပြန်သွားမယ်
                    window.location.href = 'admin-staff.html';
                } catch (err) {
                    console.error("Cleanup error:", err);
                    document.getElementById('loading').style.display = 'none';
                    alert("Cleanup failed. Please check logs.");
                }
            });
        }

        // Action: Delete Single Shift
        function askDeleteShift(id) {
            setupModal("bg-red-500/10 text-red-500 border-red-500/30", "Delete this log?", "bg-red-600", async () => {
                await db.collection("shifts").doc(id).delete(); closeConfirm();
            });
        }

        function setupModal(iconClass, msg, btnClass, callback) {
            const m = document.getElementById('confirm-modal');
            const icon = document.getElementById('modal-icon');
            icon.className = `w-16 h-16 rounded-full mx-auto flex items-center justify-center mb-5 border-4 ${iconClass}`;
            icon.innerHTML = `<svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2.5" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/></svg>`;
            document.getElementById('modal-msg').innerText = msg;
            const btn = document.getElementById('modal-confirm-btn');
            btn.className = `flex-1 py-4 rounded-2xl text-[10px] font-black uppercase tracking-widest ${btnClass}`;
            btn.innerText = "Confirm";
            btn.onclick = callback;
            m.classList.remove('!hidden');
            setTimeout(() => {
                const mContent = document.querySelector('.modal-content');
                mContent.classList.remove('scale-90', 'opacity-0');
                mContent.classList.add('scale-100', 'opacity-100');
            }, 50);
        }

        window.onload = init;
    </script>
</body>
</html>
